/* -----------------------------
   LANGUAGE + TOPIC SWITCHING
   ----------------------------- */

let currentLang = 'en';
let currentSectionId = null;

const langButtons = document.querySelectorAll('.lang-btn');
const topicSelect = document.getElementById('topicSelect');

langButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    langButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
    renderSection();
  });
});

function populateDropdown() {
  topicSelect.innerHTML = '';
  data.sections.forEach(sec => {
    const opt = document.createElement('option');
    opt.value = sec.id;
    opt.textContent = sec.title[currentLang];
    topicSelect.appendChild(opt);
  });

  if (!currentSectionId && data.sections.length > 0) {
    currentSectionId = data.sections[0].id;
  }

  topicSelect.value = currentSectionId;
}

topicSelect.addEventListener('change', () => {
  currentSectionId = topicSelect.value;
  renderSection();
});

/* -----------------------------
   RENDER SECTION + QUIZ
   ----------------------------- */

function renderSection() {
  const sec = data.sections.find(s => s.id === currentSectionId);
  if (!sec) return;

  document.getElementById('sectionTitle').innerHTML = sec.title[currentLang];
  document.getElementById('sectionSummary').innerHTML = sec.summary[currentLang];
  document.getElementById('quizTitle').innerHTML = sec.quizTitle[currentLang];

  renderQuiz(sec.questions);
}

function renderQuiz(questions) {
  const quizContainer = document.getElementById('quizContainer');
  quizContainer.innerHTML = '';

  questions.forEach((q, index) => {
    const div = document.createElement('div');
    div.className = 'question';

    div.innerHTML = `
      <strong>${index + 1}. ${q.text[currentLang]}</strong>
      <div class="options">
        ${q.options[currentLang].map((opt, i) => `
          <label>
            <input type="radio" name="q${index}" value="${i}">
            ${opt}
          </label>
        `).join('')}
      </div>
    `;

    quizContainer.appendChild(div);
  });
}

/* -----------------------------
   QUIZ SUBMISSION
   ----------------------------- */

document.getElementById('submitQuizBtn').addEventListener('click', () => {
  const sec = data.sections.find(s => s.id === currentSectionId);
  const questions = sec.questions;

  let score = 0;

  questions.forEach((q, index) => {
    const selected = document.querySelector(`input[name="q${index}"]:checked`);
    if (selected && Number(selected.value) === q.correctIndex) {
      score++;
    }
  });

  document.getElementById('quizResult').textContent =
    `${score} / ${questions.length} correct`;
});

document.getElementById('resetQuizBtn').addEventListener('click', () => {
  document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
  document.getElementById('quizResult').textContent = '';
});

/* -----------------------------
   INITIAL LOAD
   ----------------------------- */

populateDropdown();
renderSection();

</script>

</body>
